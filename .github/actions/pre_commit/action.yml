name: Pre-commit
description: |
  Set up uv and run the full pre-commit hook suite over all files.
  Mirrors `make lint` and a local `pre-commit run --all-files`: the local
  uv hooks (ruff, ty, uv-lock) run the uv.lock-pinned versions, so this
  job keeps the lockfile (unlike the unit-test composite, which strips it).

runs:
  using: composite
  steps:
    - name: Set up uv
      uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
      with:
        enable-cache: true

    - name: Cache pre-commit hook environments
      uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
      with:
        path: ~/.cache/pre-commit
        key: pre-commit-${{ runner.os }}-${{ hashFiles('.pre-commit-config.yaml') }}

    - name: Install dependencies
      shell: bash
      run: uv sync --group dev

    - name: Run pre-commit
      shell: bash
      run: uv run pre-commit run --all-files --show-diff-on-failure
