name: Pre-commit
description: |
  Set up uv and run the full pre-commit hook suite over all files.
  Mirrors `make lint` and a local `pre-commit run --all-files`: the local
  uv hooks (ruff, ty, uv-lock) run the uv.lock-pinned versions, so this
  job keeps the lockfile (unlike the unit-test composite, which strips it).

runs:
  using: composite
  steps:
    - name: Set up uv
      uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
      with:
        enable-cache: true

    - name: Cache pre-commit hook environments
      uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
      with:
        path: ~/.cache/pre-commit
        key: pre-commit-${{ runner.os }}-${{ hashFiles('.pre-commit-config.yaml') }}

    - name: Install dependencies
      shell: bash
      run: uv sync --group dev

    - name: Run pre-commit
      shell: bash
      run: uv run pre-commit run --all-files --show-diff-on-failure
