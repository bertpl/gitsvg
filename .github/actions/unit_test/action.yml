name: Unit test
description: |
  Set up Python, install dependencies, and run pytest.

inputs:
  python-version:
    description: Python version. Empty string uses .python-version.
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Set up uv
      uses: astral-sh/setup-uv@v7
      with:
        python-version: ${{ inputs.python-version }}

    - name: Install Python dependencies
      shell: bash
      run: uv sync --group dev

    - name: Run pytest
      shell: bash
      run: uv run pytest tests/python --durations=20
