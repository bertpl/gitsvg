name: Unit test
description: |
  Set up Python and run pytest at a chosen dependency resolution, optionally
  under coverage (uploading the data file for a cross-matrix combine).

inputs:
  python-version:
    description: Python version. Empty string uses .python-version.
    required: false
    default: ""
  resolution:
    description: |
      uv dependency-resolution strategy: "highest" (newest compatible — the
      default) or "lowest-direct" (the declared floors, to exercise the
      oldest supported dependency range).
    required: false
    default: highest
  coverage:
    description: |
      "true" runs tests under coverage and uploads the per-combo data file as
      an artifact, for the cross-matrix combine/gate. "false" (default, e.g.
      branch-push CI) runs plain pytest — a partial matrix can't produce a
      trustworthy cumulative number, so it isn't gated there.
    required: false
    default: "false"

runs:
  using: composite
  steps:
    - name: Set up uv
      uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
      with:
        python-version: ${{ inputs.python-version }}

    - name: Drop the lockfile so --resolution takes effect
      shell: bash
      run: rm -f uv.lock  # with a lock present uv reuses its pins and ignores --resolution

    - name: Run pytest (resolution=${{ inputs.resolution }})
      if: inputs.coverage != 'true'
      shell: bash
      run: uv run --resolution ${{ inputs.resolution }} --group dev pytest tests --durations=20

    - name: Run pytest under coverage (resolution=${{ inputs.resolution }})
      if: inputs.coverage == 'true'
      shell: bash
      run: uv run --resolution ${{ inputs.resolution }} --group dev coverage run -m pytest tests --durations=20

    - name: Upload coverage data
      if: inputs.coverage == 'true'
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
      with:
        name: coverage-data-${{ inputs.python-version }}-${{ runner.os }}-${{ inputs.resolution }}
        path: .coverage.*
        include-hidden-files: true  # .coverage.* are dotfiles; v4 excludes them by default
        if-no-files-found: error
