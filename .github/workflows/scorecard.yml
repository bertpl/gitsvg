name: Scorecard

# OpenSSF Scorecard: continuously scores the repo's security posture (branch
# protection, pinned dependencies, SAST/fuzzing presence, signed releases, …)
# and publishes the result so the README badge stays live. The capstone of the
# v0.3.x security-hardening work — it makes the score visible and tracked, but
# moves no individual check itself.

on:
  branch_protection_rule:   # re-score when branch-protection settings change
  push:
    branches: [main]
  schedule:
    - cron: "0 6 * * 3"     # weekly, Wednesday 06:00 UTC

permissions:
  contents: read

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write  # upload SARIF results to code scanning
      id-token: write         # publish results to the public Scorecard API (OIDC)
      contents: read          # checkout
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: Run analysis
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true  # required for the badge + the public scorecard.dev viewer
      - name: Upload SARIF as an artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: scorecard-sarif
          path: results.sarif
          retention-days: 5
      - name: Upload SARIF to code scanning
        uses: github/codeql-action/upload-sarif@dd903d2e4f5405488e5ef1422510ee31c8b32357 # v3.36.2
        with:
          sarif_file: results.sarif
