name: Fuzz

# Bounded atheris run over gitsvg's untrusted-input boundary (render_text).
# Stands alone, like CodeQL: it blocks on itself, but is deliberately NOT in
# the `CI gate` aggregation — a crash is a real finding worth surfacing, yet
# bounded-random noise must never gate an unrelated PR. atheris ships Linux-
# only wheels, so this pins to ubuntu / the newest supported interpreter (3.13;
# no 3.14 wheel yet).

on:
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1"  # weekly, Monday 06:00 UTC — catches regressions between PRs

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fuzz:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Set up uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          python-version: "3.13"  # newest interpreter with an atheris wheel
      - name: Run bounded fuzz session
        # ~100k iterations completes in well under a minute; a non-zero exit
        # (a crash atheris caught) fails the job.
        run: uv run --group fuzz python fuzz/fuzz_parse.py -atheris_runs=100000
