name: Pull Request to Main

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, edited]  # `edited` re-runs the PR-title check on title edits

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Cheap PR-metadata gates bundled into one job, so the expensive jobs fail
  # fast behind a single check: a bad branch name / PR title / missing
  # changelog stops the test matrix before it starts.
  preflight:
    runs-on: ubuntu-latest
    steps:
      - name: Check branch name
        if: github.actor != 'dependabot[bot]'  # Dependabot branches don't follow the prefix convention
        env:
          BRANCH: ${{ github.head_ref }}
        run: |
          if [[ ! "$BRANCH" =~ ^(feat|fix|chore|docs|refactor|test)/[a-z0-9-]+$ ]]; then
            echo "::error::Branch name '$BRANCH' does not match pattern ^(feat|fix|chore|docs|refactor|test)/[a-z0-9-]+\$"
            exit 1
          fi

      # The repo squash-merges, so the PR title becomes the commit subject on
      # main — the CI complement to the local commit-msg hook. Skipped for
      # Dependabot, whose PR titles don't follow the <type>: convention.
      - name: Check PR title
        if: github.actor != 'dependabot[bot]'
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          if [[ ! "$PR_TITLE" =~ ^(feat|fix|chore|docs|refactor|test):[[:space:]].+ ]]; then
            echo "::error::PR title '$PR_TITLE' does not match '<type>: <summary>' (type in feat|fix|chore|docs|refactor|test)"
            exit 1
          fi

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
      - name: Check changelog updated for feat/ and fix/ branches
        env:
          BRANCH: ${{ github.head_ref }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          if [[ ! "$BRANCH" =~ ^(feat|fix)/ ]]; then
            echo "Branch '$BRANCH' is not feat/ or fix/; changelog entry not required."
            exit 0
          fi
          if git diff --name-only "$BASE_SHA...HEAD" | grep -q '^CHANGELOG\.md$'; then
            echo "CHANGELOG.md was modified — OK."
            exit 0
          fi
          echo "::error::feat/ and fix/ PRs must update CHANGELOG.md (add a bullet under '## Unreleased')."
          exit 1

  pre-commit:
    needs: [preflight]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: ./.github/actions/pre_commit

  test:
    needs: [preflight]
    uses: ./.github/workflows/_unit_tests.yml

  ci-gate:
    name: CI gate
    # The single stable required check on main: branch protection requires only
    # this, so the test matrix / job set can change without re-touching repo
    # settings. `always()` is load-bearing — without it the gate is skipped when
    # an upstream job fails, and GitHub treats a skipped required check as
    # passing. Fails on any failure/cancellation; success and skipped are OK
    # (a skipped pre-commit/test means preflight failed, which itself trips it).
    if: always()
    needs: [preflight, pre-commit, test]
    runs-on: ubuntu-latest
    steps:
      - name: Fail if any required job did not succeed
        if: ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}
        run: |
          echo "::error::One or more required jobs failed."
          exit 1
