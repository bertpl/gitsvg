name: Release

on:
  push:
    tags: [v*]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: ./.github/actions/validate_version_trigger

  test:
    uses: ./.github/workflows/_unit_tests.yml

  publish:
    needs: [validate, test]
    runs-on: ubuntu-latest
    environment: prod
    permissions:
      contents: read       # job-level perms replace the top-level block, so re-list read for checkout
      id-token: write      # trusted publishing to PyPI + keyless provenance signing
      attestations: write  # store SLSA build provenance for the wheel + sdist
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: false  # don't trust a reusable cache on the release/publish path
      - run: uv build
      # SLSA build provenance over the exact artifacts we publish. Complements
      # (does not replace) the PEP 740 attestations gh-action-pypi-publish
      # emits on PyPI: this one is verifiable from the GitHub side via
      # `gh attestation verify <artifact> --repo bertpl/gitsvg`, and its bundle
      # is attached to the GitHub Release by the github-release job below.
      - name: Attest SLSA build provenance for the wheel + sdist
        id: attest
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: "dist/*"
      - name: Stage the provenance bundle under a stable name
        env:
          BUNDLE_PATH: ${{ steps.attest.outputs.bundle-path }}  # via env, not inline — keep it out of the run: template
        run: cp "$BUNDLE_PATH" provenance.sigstore.jsonl
      - name: Hand the provenance bundle to the release job
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: provenance-bundle
          path: provenance.sigstore.jsonl
          if-no-files-found: error
      - uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0

  github-release:
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write      # write implies the read checkout needs
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: false  # don't trust a reusable cache on the release/publish path
      - name: Download the provenance bundle from the publish job
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: provenance-bundle
      - name: Extract release notes from CHANGELOG.md
        run: uv run python scripts/extract_changelog.py > release_notes.md
      - name: Create GitHub Release with the provenance bundle attached
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          gh release create "$TAG" \
            --title "$TAG" \
            --notes-file release_notes.md \
            provenance.sigstore.jsonl
