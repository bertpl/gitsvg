name: Dependabot auto-merge

on: pull_request

permissions:
  contents: read

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'
    permissions:
      contents: write       # to merge
      pull-requests: write  # to approve + enable auto-merge
    steps:
      - name: Fetch Dependabot metadata
        id: meta
        uses: dependabot/fetch-metadata@25dd0e34f4fe68f24cc83900b1fe3fe149efef98 # v3.1.0

      # Approve (so the required review is satisfied — github-actions[bot] is not the
      # PR author) and queue native auto-merge, for patch/minor only. Majors get a PR
      # that waits for a human. CI's `CI gate` still gates the actual merge.
      - name: Approve and enable auto-merge for patch & minor updates
        if: steps.meta.outputs.update-type == 'version-update:semver-patch' || steps.meta.outputs.update-type == 'version-update:semver-minor'
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr review --approve "$PR_URL"
          gh pr merge --auto --squash "$PR_URL"
