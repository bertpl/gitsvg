# Read the Docs build configuration.
# https://docs.readthedocs.io/en/stable/config-file/v2.html
version: 2

build:
  os: ubuntu-24.04
  tools:
    python: "3.13"
  jobs:
    install:
      # Install the docs dependency group (mkdocs + mkdocs-material) via uv.
      - pip install uv
      - uv export --only-group docs --no-emit-project > docs-requirements.txt
      - pip install -r docs-requirements.txt

mkdocs:
  configuration: mkdocs.yml
