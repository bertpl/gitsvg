exclude: ^(design|examples)/

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-yaml
      - id: check-toml
      - id: end-of-file-fixer
      - id: trailing-whitespace

  - repo: local
    hooks:
      - id: ruff-format
        name: ruff format
        entry: uv run ruff format
        language: system
        types: [python]
        files: ^(gitsvg|tests/python|scripts)/
        pass_filenames: true
      - id: ruff
        name: ruff check
        entry: uv run ruff check
        language: system
        types: [python]
        files: ^(gitsvg|tests/python|scripts)/
        pass_filenames: true
